<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Smart AI - Luxury Assistant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --bg-tertiary: #1a1a3e;
            --text-primary: #e8e8f0;
            --text-secondary: #8888aa;
            --accent: #6366f1;
            --accent2: #06b6d4;
            --gold: #f59e0b;
            --border: rgba(255,255,255,0.06);
            --sidebar-width: 280px;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh; height: 100dvh;
            display: flex; overflow: hidden;
        }
        
        .bg-orbs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(120px); animation: orbDrift 15s ease-in-out infinite; }
        .orb-1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(99,102,241,0.15), transparent); top: -100px; right: -100px; }
        .orb-2 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(6,182,212,0.1), transparent); bottom: -80px; left: 20%; animation-delay: -5s; }
        @keyframes orbDrift { 0%,100%{transform:translate(0,0)scale(1)} 33%{transform:translate(60px,-40px)scale(1.15)} 66%{transform:translate(-40px,30px)scale(0.9)} }
        
        .sidebar { width:var(--sidebar-width); height:100vh; background:rgba(18,18,42,0.9); backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; z-index:50; position:relative; transition:transform 0.4s; }
        .sidebar-header { padding:24px 20px; border-bottom:1px solid var(--border); }
        .sidebar-logo { display:flex; align-items:center; gap:14px; }
        .logo-mini { width:42px; height:42px; background:linear-gradient(135deg,var(--accent),var(--accent2),var(--gold)); background-size:200% 200%; animation:miniLogoGradient 3s ease-in-out infinite; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 8px 30px rgba(99,102,241,0.4); }
        @keyframes miniLogoGradient { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
        .sidebar-logo span { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; color:#fff; letter-spacing:1px; }
        .new-chat-btn { margin:16px; padding:14px 20px; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:14px; color:var(--text-primary); cursor:pointer; font-size:13px; font-weight:500; transition:all 0.3s; display:flex; align-items:center; gap:10px; }
        .new-chat-btn:hover { background:rgba(99,102,241,0.15); border-color:var(--accent); transform:translateX(5px); }
        .chat-list { flex:1; overflow-y:auto; padding:8px 12px; }
        .sidebar-footer { padding:16px 20px; border-top:1px solid var(--border); display:flex; align-items:center; gap:12px; font-size:13px; color:var(--text-secondary); }
        .user-avatar { width:34px; height:34px; border-radius:12px; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:14px; color:#fff; font-weight:600; }
        .sidebar-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:40; }
        .sidebar-overlay.active { display:block; }
        .sidebar-toggle { display:none; position:fixed; top:12px; left:12px; z-index:55; width:40px; height:40px; border-radius:12px; background:rgba(18,18,42,0.9); border:1px solid var(--border); color:#fff; cursor:pointer; font-size:20px; align-items:center; justify-content:center; backdrop-filter:blur(20px); }
        
        .main-area { flex:1; display:flex; flex-direction:column; min-width:0; position:relative; z-index:1; }
        .main-header { height:56px; border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 24px; justify-content:space-between; background:rgba(18,18,42,0.5); backdrop-filter:blur(30px); }
        .main-header-left { display:flex; align-items:center; gap:20px; }
        .main-header-title { font-size:14px; font-weight:500; color:var(--text-secondary); letter-spacing:1px; }
        .mode-selector { display:flex; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:12px; padding:3px; gap:2px; }
        .mode-btn { padding:8px 16px; border:none; border-radius:10px; background:transparent; color:var(--text-secondary); cursor:pointer; font-size:12px; font-weight:500; transition:all 0.3s; letter-spacing:0.5px; white-space:nowrap; }
        .mode-btn.active { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; box-shadow:0 4px 15px rgba(99,102,241,0.3); }
        .header-actions { display:flex; gap:10px; align-items:center; }
        .icon-btn { width:38px; height:38px; border-radius:10px; border:1px solid var(--border); background:rgba(255,255,255,0.02); color:var(--text-secondary); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.3s; font-size:16px; }
        .icon-btn:hover { background:rgba(99,102,241,0.15); color:#fff; border-color:var(--accent); }
        .icon-btn.on { background:rgba(34,197,94,0.2); border-color:#22c55e; color:#22c55e; }
        
        .chat-container { flex:1; overflow-y:auto; padding:30px 24px; display:flex; flex-direction:column; gap:24px; }
        .welcome-screen { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; }
        .welcome-logo { width:100px; height:100px; background:linear-gradient(135deg,var(--accent),var(--accent2),var(--gold)); background-size:200% 200%; animation:welcomeLogoPulse 3s ease-in-out infinite; border-radius:28px; display:flex; align-items:center; justify-content:center; font-size:50px; margin-bottom:24px; box-shadow:0 20px 60px rgba(99,102,241,0.4); }
        @keyframes welcomeLogoPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        .welcome-title { font-family:'Playfair Display',serif; font-size:32px; font-weight:700; margin-bottom:12px; background:linear-gradient(135deg,#fff,var(--accent2),var(--gold)); background-clip:text; -webkit-background-clip:text; -webkit-text-fill-color:transparent; color:transparent; }
        .welcome-subtitle { color:var(--text-secondary); font-size:14px; max-width:500px; line-height:1.8; margin-bottom:40px; }
        .suggestion-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; max-width:650px; width:100%; }
        .suggestion-card { padding:18px 22px; border:1px solid var(--border); border-radius:16px; cursor:pointer; text-align:left; font-size:13px; transition:all 0.3s; color:var(--text-secondary); background:rgba(255,255,255,0.02); }
        .suggestion-card:hover { border-color:var(--accent); background:rgba(99,102,241,0.08); color:#fff; transform:translateY(-4px); }
        
        /* MESSAGES */
        .message { display:flex; gap:14px; max-width:80%; animation:msgSlide 0.4s cubic-bezier(0.175,0.885,0.32,1.275); position:relative; }
        @keyframes msgSlide { from{opacity:0;transform:translateY(20px)scale(0.95)} to{opacity:1;transform:translateY(0)scale(1)} }
        .message.user { align-self:flex-end; flex-direction:row-reverse; }
        .message-avatar { width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
        .message.user .message-avatar { background:linear-gradient(135deg,var(--accent),var(--accent2)); }
        .message.assistant .message-avatar { background:var(--bg-tertiary); border:1px solid var(--border); }
        
        .message-content {
            background:rgba(99,102,241,0.15); padding:14px 20px; border-radius:16px;
            font-size:14px; line-height:1.8; border:1px solid rgba(99,102,241,0.2);
            word-wrap:break-word; overflow-wrap:break-word; position:relative;
        }
        .message.assistant .message-content { background:rgba(255,255,255,0.03); border:1px solid var(--border); }
        
        /* ========== MESSAGE ACTION BUTTONS (EDIT/COPY) ========== */
        .msg-actions {
            display:flex; gap:4px; margin-top:8px; opacity:0;
            transition:opacity 0.2s ease; justify-content:flex-end;
        }
        .message:hover .msg-actions { opacity:1; }
        .message.user .msg-actions { justify-content:flex-start; }
        
        .msg-action-btn {
            padding:5px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.1);
            background:rgba(0,0,0,0.3); color:var(--text-secondary); cursor:pointer;
            font-size:11px; font-family:'Poppins',sans-serif; transition:all 0.2s;
            display:flex; align-items:center; gap:4px; backdrop-filter:blur(10px);
        }
        .msg-action-btn:hover { background:rgba(99,102,241,0.3); color:#fff; border-color:var(--accent); }
        .msg-action-btn.copied { background:rgba(34,197,94,0.3); border-color:#22c55e; color:#22c55e; }
        
        /* Edit Input */
        .edit-input {
            width:100%; min-width:300px; padding:10px 14px;
            border:2px solid var(--accent); border-radius:12px;
            background:rgba(0,0,0,0.6); color:#fff; font-size:14px;
            font-family:'Poppins',sans-serif; outline:none; resize:vertical;
            min-height:40px; line-height:1.6;
        }
        .edit-actions { display:flex; gap:8px; margin-top:8px; }
        .edit-btn { padding:6px 14px; border-radius:8px; border:none; cursor:pointer; font-size:12px; font-weight:500; font-family:'Poppins',sans-serif; transition:all 0.2s; }
        .edit-save { background:var(--accent); color:#fff; }
        .edit-save:hover { background:#7c3aed; }
        .edit-cancel { background:rgba(255,255,255,0.1); color:var(--text-secondary); border:1px solid var(--border); }
        .edit-cancel:hover { background:rgba(239,68,68,0.2); color:#ef4444; }
        
        .message-content pre { background:#0d1117; padding:18px; border-radius:12px; overflow-x:auto; margin:12px 0; border:1px solid rgba(255,255,255,0.1); max-width:100%; }
        .message-content code { font-family:'JetBrains Mono',monospace; font-size:13px; word-break:break-all; }
        .message-content strong { color:#fff; }
        .message-image { max-width:280px; border-radius:14px; margin-top:12px; cursor:pointer; border:1px solid var(--border); }
        
        .typing-indicator { display:flex; gap:5px; padding:6px 0; }
        .typing-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:typing 1.4s infinite; }
        .typing-dot:nth-child(2){animation-delay:0.2s}.typing-dot:nth-child(3){animation-delay:0.4s}
        @keyframes typing { 0%,60%,100%{opacity:0.3;transform:translateY(0)} 30%{opacity:1;transform:translateY(-8px)} }
        
        .input-area { padding:16px 24px; border-top:1px solid var(--border); }
        .input-container { display:flex; gap:12px; align-items:flex-end; background:rgba(18,18,42,0.5); border:2px solid var(--border); border-radius:18px; padding:10px 16px; transition:all 0.3s; backdrop-filter:blur(20px); }
        .input-container:focus-within { border-color:var(--accent); box-shadow:0 0 30px rgba(99,102,241,0.15); }
        .chat-input { flex:1; background:transparent; border:none; color:var(--text-primary); font-size:14px; font-family:'Poppins',sans-serif; resize:none; outline:none; min-height:24px; max-height:200px; padding:6px 0; }
        .chat-input::placeholder { color:var(--text-secondary); font-style:italic; }
        .send-btn { width:40px; height:40px; border-radius:12px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; color:#fff; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; transition:all 0.3s; flex-shrink:0; }
        .send-btn:hover { transform:scale(1.05); box-shadow:0 5px 25px rgba(99,102,241,0.5); }
        
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes fadeOut { from{opacity:1} to{opacity:0} }
        @keyframes popupBounce { 0%{transform:scale(0.5);opacity:0} 50%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
        
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:10px; }
        
        /* Toast Notification */
        .toast {
            position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
            background:rgba(34,197,94,0.9); color:#fff; padding:12px 24px;
            border-radius:12px; font-size:13px; font-weight:500; z-index:9999;
            animation:toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
            pointer-events:none; backdrop-filter:blur(20px);
        }
        @keyframes toastIn { from{opacity:0;transform:translateX(-50%)translateY(20px)} to{opacity:1;transform:translateX(-50%)translateY(0)} }
        @keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateX(-50%)translateY(-20px)} }
        
        @media(max-width:768px){
            .sidebar{position:fixed;left:-100%;top:0;height:100vh;z-index:60}.sidebar.open{left:0}
            .sidebar-toggle{display:flex}.message{max-width:92%}.suggestion-grid{grid-template-columns:1fr}
            .mode-selector{display:none}.main-header{padding:0 12px 0 60px}
            .chat-container{padding:16px 12px}
            .message-content{font-size:13px;padding:12px 16px}
            .msg-action-btn{font-size:10px;padding:4px 8px}
            .edit-input{min-width:200px;font-size:13px}
        }
        @media(max-width:480px){
            .message{max-width:95%}.chat-container{padding:12px 8px}
            .message-content{font-size:12px;padding:10px 14px}
            .welcome-logo{width:60px;height:60px;font-size:30px}
            .welcome-title{font-size:20px}
        }
    </style>
</head>
<body>
    <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
    
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>
    
    <input type="hidden" id="dataUsername" value="{{ username }}">
    <input type="hidden" id="dataUserInitial" value="{{ username[0] | upper }}">
    <input type="hidden" id="dataShowWelcome" value="{{ show_welcome | default(false) | lower }}">
    <input type="hidden" id="dataWelcomeName" value="{{ welcome_name | default('') }}">
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><div class="sidebar-logo"><div class="logo-mini">🧠</div><span>Smart AI</span></div></div>
        <button class="new-chat-btn" onclick="newChat();if(window.innerWidth<=768)toggleSidebar();">✦ New Conversation</button>
        <div class="chat-list" id="chatList"></div>
        <div class="sidebar-footer">
            <div class="user-avatar" id="sidebarAvatar"></div>
            <span id="sidebarUsername"></span>
            <a href="/logout" style="margin-left:auto;color:var(--text-secondary);text-decoration:none;font-size:12px;">Logout</a>
        </div>
    </div>
    
    <div class="main-area">
        <div class="main-header">
            <div class="main-header-left">
                <span class="main-header-title">✦ Smart AI</span>
                <div class="mode-selector">
                    <button class="mode-btn active" onclick="setMode('instant',this)">⚡ Instant</button>
                    <button class="mode-btn" onclick="setMode('expert',this)">🎓 Expert</button>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" title="Upload" onclick="document.getElementById('imageInput').click()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                </button>
                <button class="icon-btn" id="voiceBtn" onclick="toggleVoice()">🔇</button>
                <a href="/history" class="icon-btn" style="text-decoration:none;">📜</a>
            </div>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-logo">🧠</div>
                <div class="welcome-title">Smart Study AI</div>
                <div class="welcome-subtitle">Ask anything, get instant help!</div>
                <div class="suggestion-grid">
                    <div class="suggestion-card" onclick="sendSuggestion('Explain quantum computing')"><div class="card-icon">🔬</div><div>Quantum Computing</div></div>
                    <div class="suggestion-card" onclick="sendSuggestion('Write a Python algorithm')"><div class="card-icon">💻</div><div>Python Algorithm</div></div>
                    <div class="suggestion-card" onclick="sendSuggestion('Solve: 3x²+6x-9=0')"><div class="card-icon">📐</div><div>Math Solution</div></div>
                    <div class="suggestion-card" onclick="sendSuggestion('History of Ancient India')"><div class="card-icon">📚</div><div>Ancient India</div></div>
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <div class="input-container">
                <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
                <textarea class="chat-input" id="chatInput" placeholder="Ask Smart AI..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
    
    <audio id="audioPlayer" style="display:none"></audio>
    
    <script>
        // ============================================
        // DATA FROM BACKEND
        // ============================================
        var USERNAME = document.getElementById('dataUsername').value;
        var USER_INITIAL = document.getElementById('dataUserInitial').value;
        var SHOW_WELCOME = document.getElementById('dataShowWelcome').value === 'true';
        var WELCOME_NAME = document.getElementById('dataWelcomeName').value;
        
        document.getElementById('sidebarAvatar').textContent = USER_INITIAL;
        document.getElementById('sidebarUsername').textContent = USERNAME;
        
        // ============================================
        // STATE
        // ============================================
        var currentChatId = generateId();
        var currentMode = 'instant';
        var voiceEnabled = false;
        var messagesData = []; // Store message data for edit
        
        function generateId() { return 'chat_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); }
        
        // ============================================
        // SIDEBAR & MODE
        // ============================================
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('active'); }
        function setMode(m, b) { currentMode = m; var bs = document.querySelectorAll('.mode-btn'); for (var i = 0; i < bs.length; i++) bs[i].classList.remove('active'); b.classList.add('active'); }
        function toggleVoice() { voiceEnabled = !voiceEnabled; var b = document.getElementById('voiceBtn'); if (voiceEnabled) { b.classList.add('on'); b.textContent = '🔊'; } else { b.classList.remove('on'); b.textContent = '🔇'; var a = document.getElementById('audioPlayer'); a.pause(); a.src = ''; } }
        function newChat() { currentChatId = generateId(); messagesData = []; document.getElementById('chatContainer').innerHTML = '<div class="welcome-screen"><div class="welcome-logo">🧠</div><div class="welcome-title">New Chat</div><div class="welcome-subtitle">Ask me anything!</div></div>'; }
        function sendSuggestion(t) { document.getElementById('chatInput').value = t; sendMessage(); }
        
        // ============================================
        // TOAST NOTIFICATION
        // ============================================
        function showToast(message) {
            var toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(function() { if (document.body.contains(toast)) toast.remove(); }, 2500);
        }
        
        // ============================================
        // ✨ COPY MESSAGE
        // ============================================
        function copyMessage(msgElement) {
            var content = msgElement.querySelector('.message-content');
            var text = content.innerText || content.textContent;
            
            // Copy to clipboard
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() {
                    showToast('✅ Copied to clipboard!');
                }).catch(function() {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }
        
        function fallbackCopy(text) {
            var textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try { document.execCommand('copy'); showToast('✅ Copied!'); } catch(e) { showToast('❌ Failed to copy'); }
            document.body.removeChild(textarea);
        }
        
        // ============================================
        // ✏️ EDIT MESSAGE
        // ============================================
        function editMessage(msgElement, msgIndex) {
            var contentDiv = msgElement.querySelector('.message-content');
            var originalText = messagesData[msgIndex] ? messagesData[msgIndex].originalText : (contentDiv.innerText || contentDiv.textContent);
            
            // Hide original content and actions
            var originalHTML = contentDiv.innerHTML;
            contentDiv.setAttribute('data-original', originalHTML);
            
            // Create edit area
            var editHTML = '<textarea class="edit-input" id="editInput_' + msgIndex + '" rows="3">' + escapeHtml(originalText) + '</textarea>';
            editHTML += '<div class="edit-actions">';
            editHTML += '<button class="edit-btn edit-save" onclick="saveEdit(' + msgIndex + ', \'' + msgIndex + '\')">✅ Save</button>';
            editHTML += '<button class="edit-btn edit-cancel" onclick="cancelEdit(' + msgIndex + ')">❌ Cancel</button>';
            editHTML += '</div>';
            
            contentDiv.innerHTML = editHTML;
            
            // Focus on textarea
            setTimeout(function() {
                var input = document.getElementById('editInput_' + msgIndex);
                if (input) { input.focus(); input.selectionStart = input.value.length; }
            }, 100);
        }
        
        function saveEdit(msgIndex, inputId) {
            var input = document.getElementById('editInput_' + msgIndex);
            if (!input) return;
            
            var newText = input.value.trim();
            if (!newText) { showToast('⚠️ Message cannot be empty'); return; }
            
            var msgElement = document.querySelectorAll('.message.user')[msgIndex];
            if (!msgElement) return;
            
            var contentDiv = msgElement.querySelector('.message-content');
            var actionsHTML = contentDiv.querySelector('.msg-actions') ? contentDiv.querySelector('.msg-actions').outerHTML : '';
            
            // Update content
            contentDiv.innerHTML = formatMessageText(newText) + actionsHTML;
            
            // Update stored data
            if (messagesData[msgIndex]) {
                messagesData[msgIndex].content = newText;
                messagesData[msgIndex].originalText = newText;
            }
            
            // Re-attach event listeners
            attachActionListeners(msgElement, msgIndex);
            
            showToast('✅ Message updated!');
            
            // Optional: Resend the edited message to AI
            // sendMessageWithText(newText);
        }
        
        function cancelEdit(msgIndex) {
            var msgElement = document.querySelectorAll('.message.user')[msgIndex];
            if (!msgElement) return;
            
            var contentDiv = msgElement.querySelector('.message-content');
            var originalHTML = contentDiv.getAttribute('data-original');
            if (originalHTML) {
                contentDiv.innerHTML = originalHTML;
                attachActionListeners(msgElement, msgIndex);
            }
        }
        
        function formatMessageText(text) {
            // Basic formatting
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/`(.*?)`/g, '<code>$1</code>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }
        
        function escapeHtml(text) {
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ============================================
        // ATTACH ACTION LISTENERS
        // ============================================
        function attachActionListeners(msgElement, msgIndex) {
            var actionsDiv = msgElement.querySelector('.msg-actions');
            if (!actionsDiv) return;
            
            // Remove old listeners by cloning
            var newActions = actionsDiv.cloneNode(true);
            actionsDiv.parentNode.replaceChild(newActions, actionsDiv);
            
            // Add new listeners
            var copyBtn = newActions.querySelector('.msg-copy-btn');
            var editBtn = newActions.querySelector('.msg-edit-btn');
            
            if (copyBtn) {
                copyBtn.onclick = function(e) {
                    e.stopPropagation();
                    copyMessage(msgElement);
                };
            }
            if (editBtn) {
                editBtn.onclick = function(e) {
                    e.stopPropagation();
                    editMessage(msgElement, msgIndex);
                };
            }
        }
        
        // ============================================
        // ADD MESSAGE WITH EDIT/COPY BUTTONS
        // ============================================
        function addMessage(role, content, imageUrl) {
            imageUrl = imageUrl || null;
            var container = document.getElementById('chatContainer');
            var welcome = document.getElementById('welcomeScreen');
            if (welcome) welcome.remove();
            
            var msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + role;
            
            var avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? USER_INITIAL : '🧠';
            
            var contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = content;
            
            // Add image if present
            if (imageUrl) {
                var img = document.createElement('img');
                img.src = imageUrl;
                img.className = 'message-image';
                img.onclick = function() { window.open(imageUrl); };
                contentDiv.appendChild(img);
            }
            
            // ✨ ADD EDIT & COPY BUTTONS for USER messages
            if (role === 'user') {
                var msgIndex = messagesData.length;
                
                // Store message data
                messagesData.push({
                    content: content,
                    originalText: (contentDiv.innerText || contentDiv.textContent).trim(),
                    role: role
                });
                
                var actionsDiv = document.createElement('div');
                actionsDiv.className = 'msg-actions';
                actionsDiv.innerHTML = 
                    '<button class="msg-action-btn msg-edit-btn" title="Edit message">✏️ Edit</button>' +
                    '<button class="msg-action-btn msg-copy-btn" title="Copy message">📋 Copy</button>';
                contentDiv.appendChild(actionsDiv);
                
                // Attach listeners
                setTimeout(function() {
                    attachActionListeners(msgDiv, msgIndex);
                }, 50);
            }
            
            // ✨ ADD COPY BUTTON for ASSISTANT messages
            if (role === 'assistant') {
                var actionsDiv = document.createElement('div');
                actionsDiv.className = 'msg-actions';
                actionsDiv.innerHTML = '<button class="msg-action-btn msg-copy-btn" title="Copy response">📋 Copy</button>';
                contentDiv.appendChild(actionsDiv);
                
                setTimeout(function() {
                    var copyBtn = actionsDiv.querySelector('.msg-copy-btn');
                    if (copyBtn) {
                        copyBtn.onclick = function(e) {
                            e.stopPropagation();
                            copyMessage(msgDiv);
                        };
                    }
                }, 50);
            }
            
            msgDiv.appendChild(avatar);
            msgDiv.appendChild(contentDiv);
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
            
            return msgDiv;
        }
        
        // ============================================
        // TYPING INDICATOR
        // ============================================
        function showTyping() {
            var c = document.getElementById('chatContainer'), w = document.getElementById('welcomeScreen');
            if (w) w.remove();
            var d = document.createElement('div'); d.className = 'message assistant'; d.id = 'typing';
            d.innerHTML = '<div class="message-avatar">🧠</div><div class="message-content"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
            c.appendChild(d); c.scrollTop = c.scrollHeight;
        }
        function hideTyping() { var t = document.getElementById('typing'); if (t) t.remove(); }
        
        // ============================================
        // VOICE
        // ============================================
        async function speakText(t) {
            if (!voiceEnabled || !t) return;
            try {
                var clean = t.replace(/<[^>]*>/g, '').trim();
                var r = await fetch('/api/speak', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({text: clean}) });
                var d = await r.json();
                if (d.audio) { var a = document.getElementById('audioPlayer'); a.src = 'data:audio/mp3;base64,' + d.audio; a.play(); }
            } catch(e) {}
        }
        
        // ============================================
        // IMAGE UPLOAD
        // ============================================
        async function handleImageUpload(e) {
            var f = e.target.files[0]; if (!f) return;
            addMessage('user', '📎 Uploading...'); showTyping();
            var fd = new FormData(); fd.append('image', f); fd.append('mode', currentMode);
            try {
                var r = await fetch('/api/upload-image', { method: 'POST', body: fd });
                var d = await r.json(); hideTyping();
                if (d.success) { addMessage('user', '📎 ' + f.name, d.image.url); addMessage('assistant', d.analysis || 'Analyzed!'); }
            } catch(e) { hideTyping(); }
            document.getElementById('imageInput').value = '';
        }
        
        // ============================================
        // SEND MESSAGE
        // ============================================
        async function sendMessage() {
            var i = document.getElementById('chatInput'), m = i.value.trim(); if (!m) return;
            i.value = ''; i.style.height = 'auto';
            addMessage('user', m); showTyping();
            try {
                var r = await fetch('/api/chat', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({message: m, mode: currentMode, chat_id: currentChatId}) });
                var d = await r.json(); hideTyping();
                if (d.status === 'success') { addMessage('assistant', d.response); if (voiceEnabled) speakText(d.response); }
            } catch(e) { hideTyping(); }
        }
        
        document.getElementById('chatInput').addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 200) + 'px'; });
        
        // ============================================
        // 🎉 LOGIN POPUP
        // ============================================
        if (SHOW_WELCOME && WELCOME_NAME !== '') { document.addEventListener('DOMContentLoaded', function() { showWelcomePopup(WELCOME_NAME); }); }
        
        function showWelcomePopup(username) {
            var overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:9999;display:flex;justify-content:center;align-items:center;animation:fadeIn 0.5s ease;padding:20px;';
            var popup = document.createElement('div');
            popup.style.cssText = 'background:rgba(18,18,42,0.95);backdrop-filter:blur(40px);border-radius:30px;padding:50px 40px;text-align:center;border:1px solid rgba(99,102,241,0.3);box-shadow:0 30px 80px rgba(0,0,0,0.6);animation:popupBounce 0.6s;max-width:420px;width:100%;';
            popup.innerHTML = '<div style="font-size:70px;margin-bottom:20px;animation:iconFloat 2s ease-in-out infinite;">🎉</div><h2 style="font-family:\'Playfair Display\',serif;font-size:28px;color:#fff;margin-bottom:10px;">Welcome Back!</h2><p style="font-size:18px;color:#a5b4fc;margin-bottom:5px;font-weight:600;">' + escapeHtml(username) + '</p><p style="color:rgba(255,255,255,0.6);font-size:14px;margin-bottom:30px;">✦ Smart AI is ready ✦</p><button onclick="closePopupBtn(this)" style="padding:14px 40px;background:linear-gradient(135deg,#6366f1,#06b6d4);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;">Let\'s Go! 🚀</button>';
            overlay.appendChild(popup); document.body.appendChild(overlay);
            overlay.addEventListener('click', function(e) { if (e.target === overlay) closePopupOverlay(overlay); });
            setTimeout(function() { if (document.body.contains(overlay)) closePopupOverlay(overlay); }, 6000);
        }
        
        function closePopupBtn(btn) { closePopupOverlay(btn.parentElement.parentElement); }
        function closePopupOverlay(overlay) { overlay.style.animation = 'fadeOut 0.3s ease forwards'; setTimeout(function() { if (document.body.contains(overlay)) overlay.remove(); }, 300); }
        function escapeHtml(text) { var d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
        
        // Load history
        (function() {
            var params = new URLSearchParams(window.location.search), cid = params.get('chat_id');
            if (cid) { currentChatId = cid; fetch('/api/history/messages/' + cid).then(function(r) { return r.json(); }).then(function(data) { if (data.success && data.messages.length > 0) { var w = document.getElementById('welcomeScreen'); if (w) w.remove(); for (var i = 0; i < data.messages.length; i++) { var m = data.messages[i]; if (m.role !== 'system') addMessage(m.role === 'user' ? 'user' : 'assistant', m.content, m.image_url); } } }).catch(function() {}); }
        })();
    </script>
</body>
</html>
