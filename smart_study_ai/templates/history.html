<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat History - Smart AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --bg-tertiary: #1a1a3e;
            --text-primary: #e8e8f0;
            --text-secondary: #8888aa;
            --accent: #6366f1;
            --accent2: #06b6d4;
            --gold: #f59e0b;
            --border: rgba(255,255,255,0.06);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .bg-orbs {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            animation: orbDrift 15s ease-in-out infinite;
        }
        
        .orb-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(99,102,241,0.12), transparent);
            top: -100px; right: -100px;
        }
        
        .orb-2 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(6,182,212,0.08), transparent);
            bottom: -80px; left: 20%;
            animation-delay: -5s;
        }
        
        @keyframes orbDrift {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, -30px) scale(1.1); }
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }
        
        .header {
            background: rgba(18,18,42,0.7);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 24px;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logo-mini {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            animation: logoGlow 3s ease-in-out infinite;
        }
        
        @keyframes logoGlow {
            0%,100% { box-shadow: 0 8px 30px rgba(99,102,241,0.4); }
            50% { box-shadow: 0 8px 50px rgba(99,102,241,0.7); }
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, var(--accent2));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }
        
        .btn-back {
            background: rgba(255,255,255,0.03);
            color: var(--text-primary);
        }
        
        .btn-back:hover {
            background: rgba(99,102,241,0.15);
            border-color: var(--accent);
        }
        
        .btn-new {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border: none;
            font-weight: 600;
        }
        
        .btn-new:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99,102,241,0.4);
        }
        
        .btn-danger {
            background: rgba(239,68,68,0.1);
            border-color: rgba(239,68,68,0.3);
            color: #fca5a5;
        }
        
        .btn-danger:hover {
            background: rgba(239,68,68,0.2);
            color: #fff;
        }
        
        .chats-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .chat-card {
            background: rgba(18,18,42,0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        
        .chat-card:hover {
            background: rgba(99,102,241,0.08);
            border-color: var(--accent);
            transform: translateX(5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        
        .chat-title {
            font-size: 15px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .chat-meta {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            gap: 15px;
        }
        
        .chat-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        
        .btn-sm {
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }
        
        .btn-view {
            background: rgba(99,102,241,0.15);
            color: var(--accent);
            border-color: rgba(99,102,241,0.3);
        }
        
        .btn-view:hover {
            background: rgba(99,102,241,0.3);
            color: #fff;
        }
        
        .btn-continue {
            background: rgba(6,182,212,0.15);
            color: var(--accent2);
            border-color: rgba(6,182,212,0.3);
        }
        
        .btn-continue:hover {
            background: rgba(6,182,212,0.3);
            color: #fff;
        }
        
        .btn-del {
            background: rgba(239,68,68,0.1);
            color: #fca5a5;
            border-color: rgba(239,68,68,0.3);
        }
        
        .btn-del:hover {
            background: rgba(239,68,68,0.2);
            color: #ef4444;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        
        .empty-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
        
        .empty-state h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .modal.active { display: flex; }
        
        .modal-content {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 30px;
            max-width: 750px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .modal-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
        }
        
        .modal-close {
            width: 36px; height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: #fff;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s ease;
        }
        
        .modal-close:hover {
            background: rgba(239,68,68,0.2);
            border-color: #ef4444;
        }
        
        .msg-item {
            margin-bottom: 16px;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.7;
            max-width: 85%;
        }
        
        .msg-user {
            background: rgba(99,102,241,0.2);
            margin-left: auto;
            border: 1px solid rgba(99,102,241,0.3);
        }
        
        .msg-assistant {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
        }
        
        .msg-image {
            max-width: 200px;
            border-radius: 10px;
            margin-top: 8px;
            cursor: pointer;
        }
        
        .msg-time {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 6px;
        }
        
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .chat-card { flex-direction: column; }
            .chat-actions { justify-content: center; }
        }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    
    <div class="container">
        <div class="header">
            <div class="header-left">
                <div class="logo-mini">🧠</div>
                <h1>Chat History</h1>
            </div>
            <div class="header-actions">
                <a href="/dashboard" class="btn btn-back">🏠 Dashboard</a>
                <a href="/dashboard?new_chat=true" class="btn btn-new">➕ New Chat</a>
                <button class="btn btn-danger" onclick="clearAll()">🗑️ Clear All</button>
            </div>
        </div>
        
        <div class="chats-list" id="chatsList">
            <div class="empty-state">
                <div class="empty-icon">💬</div>
                <h2>Loading chats...</h2>
            </div>
        </div>
    </div>
    
    <div class="modal" id="viewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📜 Messages</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modalMessages"></div>
        </div>
    </div>
    
    <script>
        async function loadChats() {
            try {
                const r = await fetch('/api/history/chats');
                const d = await r.json();
                const c = document.getElementById('chatsList');
                
                if (d.success && d.chats.length > 0) {
                    c.innerHTML = d.chats.map(chat => `
                        <div class="chat-card">
                            <div class="chat-info">
                                <div class="chat-title">💬 ${escapeHtml(chat.title || 'Untitled')}</div>
                                <div class="chat-meta">
                                    <span>📅 ${formatDate(chat.updated_at)}</span>
                                    <span>💬 ${chat.message_count} messages</span>
                                </div>
                            </div>
                            <div class="chat-actions">
                                <button class="btn-sm btn-view" onclick="viewChat('${chat.id}')">👁️ View</button>
                                <button class="btn-sm btn-continue" onclick="continueChat('${chat.id}')">💬 Continue</button>
                                <button class="btn-sm btn-del" onclick="deleteChat('${chat.id}')">🗑️</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    c.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <h2>No conversations yet</h2>
                            <p>Start chatting to see your history here!</p>
                            <br>
                            <a href="/dashboard" class="btn btn-new">💬 Start Chatting</a>
                        </div>
                    `;
                }
            } catch(e) {
                document.getElementById('chatsList').innerHTML = '<div class="empty-state"><h2>Error loading</h2></div>';
            }
        }
        
        async function viewChat(id) {
            try {
                const r = await fetch(`/api/history/messages/${id}`);
                const d = await r.json();
                document.getElementById('modalMessages').innerHTML = d.messages.map(m => `
                    <div class="msg-item ${m.role === 'user' ? 'msg-user' : 'msg-assistant'}">
                        ${m.content}
                        ${m.image_url ? `<br><img src="${m.image_url}" class="msg-image" onclick="window.open('${m.image_url}')">` : ''}
                        <div class="msg-time">${formatDate(m.timestamp)}</div>
                    </div>
                `).join('');
                document.getElementById('viewModal').classList.add('active');
            } catch(e) { alert('Error loading messages'); }
        }
        
        function continueChat(id) { window.location.href = `/dashboard?chat_id=${id}`; }
        
        async function deleteChat(id) {
            if (!confirm('Delete this conversation?')) return;
            await fetch(`/api/history/delete/${id}`, { method: 'DELETE' });
            loadChats();
        }
        
        async function clearAll() {
            if (!confirm('Delete ALL chat history? This cannot be undone!')) return;
            await fetch('/api/history/clear', { method: 'DELETE' });
            loadChats();
        }
        
        function closeModal() { document.getElementById('viewModal').classList.remove('active'); }
        
        function formatDate(d) {
            if (!d) return 'Unknown';
            const date = new Date(d);
            return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
        
        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        
        document.getElementById('viewModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
        
        loadChats();
    </script>
</body>
</html>
